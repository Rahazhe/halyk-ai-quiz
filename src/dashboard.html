<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B0F1A;--bg-card:#1e293b;--primary:#068C6E;--primary-light:#0AAE8A;
  --accent:#F9B000;--indigo:#6366F1;--text-primary:#f8fafc;
  --text-secondary:#94a3b8;--text-muted:#64748b;--border:rgba(255,255,255,0.06);
  --radius-lg:16px;--radius-sm:8px;--font:'Manrope',system-ui,sans-serif;
}
html,body{height:100%;overflow-y:auto;background:var(--bg);color:var(--text-primary);font-family:var(--font);-webkit-font-smoothing:antialiased}
body.hide-cursor,body.hide-cursor *{cursor:none!important}

/* Layout */
.dashboard{display:grid;min-height:100vh;padding:20px 28px;grid-template-rows:auto auto minmax(220px,1fr) minmax(200px,1fr);gap:16px;overflow-y:auto}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:16px}
.header-title{font-size:28px;font-weight:800;letter-spacing:-0.02em;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.live-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:0.05em}
.live-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse-dot 1.5s ease-in-out infinite}
@keyframes pulse-dot{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(239,68,68,0.5)}
  50%{opacity:0.7;box-shadow:0 0 0 6px rgba(239,68,68,0)}
}
.header-right{display:flex;align-items:center;gap:14px}
.conn-status{width:10px;height:10px;border-radius:50%;transition:background 0.3s}
.conn-status.connected{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5)}
.conn-status.disconnected{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5)}
.logo-svg{height:40px}
.logo-svg .h0{fill:#F8AE00}.logo-svg .h1{fill:none;stroke:#0AAE8A;stroke-miterlimit:10}.logo-svg .h2{fill:#0AAE8A}

/* Counter Cards */
.counters{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.counter-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 20px;text-align:center;position:relative;overflow:hidden}
.counter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.counter-card.total::before{background:linear-gradient(90deg,var(--primary-light),var(--accent))}
.counter-card.visionary::before{background:var(--primary-light)}
.counter-card.pragmatist::before{background:var(--accent)}
.counter-card.optimizer::before{background:var(--indigo)}
.counter-num{font-size:56px;font-weight:800;line-height:1;letter-spacing:-0.03em;margin-bottom:8px;font-variant-numeric:tabular-nums}
.counter-card.total .counter-num{color:var(--text-primary)}
.counter-card.visionary .counter-num{color:var(--primary-light)}
.counter-card.pragmatist .counter-num{color:var(--accent)}
.counter-card.optimizer .counter-num{color:var(--indigo)}
.counter-label{font-size:15px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em}

/* Charts */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;min-height:0}
.chart-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;display:flex;flex-direction:column}
.chart-title{font-size:16px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:20px}

/* Bar Chart */
.bar-chart{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px}
.bar-row{display:flex;align-items:center;gap:14px}
.bar-label{width:160px;font-size:16px;font-weight:600;color:var(--text-primary);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:36px;background:rgba(255,255,255,0.05);border-radius:var(--radius-sm);overflow:hidden}
.bar-fill{height:100%;border-radius:var(--radius-sm);transition:width 0.8s cubic-bezier(0.4,0,0.2,1);min-width:2px}
.bar-fill.tax{background:linear-gradient(90deg,#056b54,var(--primary))}
.bar-fill.voice{background:linear-gradient(90deg,#c78d00,var(--accent))}
.bar-fill.chat{background:linear-gradient(90deg,#4f46e5,var(--indigo))}
.bar-pct{width:60px;font-size:20px;font-weight:700;color:var(--text-primary);text-align:left;flex-shrink:0;font-variant-numeric:tabular-nums}

/* Donut Chart */
.donut-container{flex:1;display:flex;align-items:center;justify-content:center;gap:32px}
.donut-wrapper{position:relative}
.donut{width:200px;height:200px;border-radius:50%;transition:background 0.8s cubic-bezier(0.4,0,0.2,1)}
.donut-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-center-num{font-size:36px;font-weight:800;color:var(--text-primary);line-height:1;font-variant-numeric:tabular-nums}
.donut-center-label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-top:4px}
.donut-legend{display:flex;flex-direction:column;gap:14px}
.legend-item{display:flex;align-items:center;gap:10px}
.legend-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.legend-dot.vis{background:var(--primary-light)}
.legend-dot.prag{background:var(--accent)}
.legend-dot.opt{background:var(--indigo)}
.legend-text{font-size:15px;font-weight:600;color:var(--text-primary)}
.legend-pct{font-size:15px;font-weight:700;color:var(--text-secondary);margin-left:auto;font-variant-numeric:tabular-nums}

/* Live Feed */
.feed-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 24px;overflow:hidden}
.feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.feed-title{font-size:14px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em}
.feed-count{font-size:13px;font-weight:600;color:var(--text-muted)}
.feed-list{display:flex;flex-direction:column;gap:4px}
.feed-item{display:grid;grid-template-columns:1fr auto;align-items:center;padding:8px 12px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);animation:feed-in 0.4s ease-out}
.feed-item:nth-child(odd){background:rgba(255,255,255,0.03)}
.feed-info{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:500;color:var(--text-primary);overflow:hidden}
.feed-profile-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;flex-shrink:0}
.feed-profile-tag.visionary{background:rgba(10,174,138,0.15);color:var(--primary-light)}
.feed-profile-tag.pragmatist{background:rgba(249,176,0,0.15);color:var(--accent)}
.feed-profile-tag.optimizer{background:rgba(99,102,241,0.15);color:var(--indigo)}
.feed-product{font-size:13px;font-weight:600;color:var(--text-muted);margin-left:4px}
.feed-time{font-size:14px;font-weight:600;color:var(--text-muted);font-variant-numeric:tabular-nums;flex-shrink:0}
.feed-arrow{color:var(--text-muted);margin:0 4px}
@keyframes feed-in{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>

  pctB2B:$('pctB2B'), pctB2C:$('pctB2C'), pctIdent:$('pctIdent'),
  donutChart:$('donutChart'), donutTotal:$('donutTotal'),
  lgdAI:$('lgdAI'), lgdMatrix:$('lgdMatrix'), lgdBeta:$('lgdBeta'),
  feedList:$('feedList'), feedCount:$('feedCount'), connStatus:$('connStatus')
};

function animateCounter(element,from,to,duration){
  duration=duration||CONFIG.COUNTER_DURATION;
  element.textContent=to;
  if(from===to)return;
  var start=performance.now();
  function update(now){
    var p=Math.min((now-start)/duration,1);
    var eased=1-Math.pow(1-p,3);
    element.textContent=Math.round(from+(to-from)*eased);
    if(p<1)requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function updateCounters(s){
  var nT=s.total||0, nB2B=s.b2b_count||0, nB2C=s.b2c_count||0, nAI=s.ai_used_count||0;
  animateCounter(el.cntTotal,state.total,nT);
  animateCounter(el.cntB2B,state.b2b,nB2B);
  animateCounter(el.cntB2C,state.b2c,nB2C);
  animateCounter(el.cntAI,state.ai,nAI);
  state.total=nT; state.b2b=nB2B; state.b2c=nB2C; state.ai=nAI;
}

function updateBars(s){
  var tot=s.total||0, b2b=s.b2b_count||0, b2c=s.b2c_count||0, ident=s.identified_count||0;
  var pB2B=tot>0?Math.round(b2b/tot*100):0;
  var pB2C=tot>0?Math.round(b2c/tot*100):0;
  var pId=tot>0?Math.round(ident/tot*100):0;
  el.barB2B.style.width=pB2B+'%'; el.barB2C.style.width=pB2C+'%'; el.barIdent.style.width=pId+'%';
  el.pctB2B.textContent=pB2B+'%'; el.pctB2C.textContent=pB2C+'%'; el.pctIdent.textContent=pId+'%';
}

function updateDonut(s){
  var tot=s.total||0, ai=s.ai_used_count||0, beta=s.beta_count||0;
  var matrix=tot-ai;
  var pAI=tot>0?(ai/tot)*100:50;
  var pMat=tot>0?(matrix/tot)*100:50;
  el.donutChart.style.background='conic-gradient(var(--primary-light) 0% '+pAI+'%,var(--accent) '+pAI+'% 100%)';
  animateCounter(el.donutTotal,state.total,tot);
  el.lgdAI.textContent=Math.round(pAI)+'%';
  el.lgdMatrix.textContent=Math.round(pMat)+'%';
  el.lgdBeta.textContent=beta;
}

function updateFeed(feed){
  if(!feed||!feed.length)return;
  var items=feed.slice(0,CONFIG.FEED_LIMIT);
  while(el.feedList.firstChild)el.feedList.removeChild(el.feedList.firstChild);

  for(var i=0;i<items.length;i++){
    var e=items[i];
    var row=document.createElement('div');
    row.className='feed-item';
    row.style.animationDelay=(i*50)+'ms';

    var info=document.createElement('div');
    info.className='feed-info';

    // Name
    var name=document.createElement('span');
    var stableNum=parseInt((e.id||'').replace(/-/g,'').slice(-5)||'0',16)%1000;
    var rawName=e.display_name||'';
    var isAnon=!rawName||rawName==='Аноним';
    var dn=isAnon?'Аноним #'+stableNum:rawName;
    name.textContent=e.department?dn+', '+e.department:dn;
    info.appendChild(name);

    var a1=document.createElement('span');
    a1.className='feed-arrow';a1.textContent='—';
    info.appendChild(a1);

    // Industry
    var ind=document.createElement('span');
    ind.className='feed-profile-tag '+(e.business_type||'');
    ind.style.cssText='background:rgba(6,140,110,0.15);color:#0AAE8A;font-size:11px;padding:2px 8px;border-radius:20px';
    ind.textContent=e.industry||(e.business_type==='b2b'?'B2B':'B2C');
    info.appendChild(ind);

    // Top products
    if(e.top3_products&&e.top3_products.length){
      var a2=document.createElement('span');
      a2.className='feed-arrow';a2.textContent='→';
      info.appendChild(a2);
      var prod=document.createElement('span');
      prod.className='feed-product';
      prod.textContent=e.top3_products.slice(0,2).map(function(k){return PRODUCT_SHORT[k]||k;}).join(', ');
      info.appendChild(prod);
    }

    // AI badge
    if(e.used_ai){
      var aiBadge=document.createElement('span');
      aiBadge.style.cssText='font-size:10px;background:rgba(249,176,0,0.15);color:#F9B000;padding:2px 6px;border-radius:10px;margin-left:4px;font-weight:700';
      aiBadge.textContent='AI';
      info.appendChild(aiBadge);
    }

    row.appendChild(info);

    var time=document.createElement('span');
    time.className='feed-time';
    var d=new Date(e.created_at);
    time.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    row.appendChild(time);

    el.feedList.appendChild(row);
  }
  el.feedCount.textContent='Последние '+items.length+' записей';
}

function setConnected(c){
  el.connStatus.className='conn-status '+(c?'connected':'disconnected');
  el.connStatus.title=c?'\u041F\u043E\u0434\u043A\u043B\u044E\u0447\u0435\u043D\u043E':'\u041E\u0442\u043A\u043B\u044E\u0447\u0435\u043D\u043E';
}

async function loadData(){
  if(isDemo)return;
  try{
    var sr=await supabaseClient.from('quiz_stats').select('*').single();
    if(sr.error)throw sr.error;
    var fr=await supabaseClient.from('quiz_feed').select('*');
    if(fr.error)throw fr.error;
    updateCounters(sr.data);updateBars(sr.data);updateDonut(sr.data);updateFeed(fr.data);
    setConnected(true);
  }catch(err){console.warn('loadData error:',err);setConnected(false)}
}

function subscribeRealtime(){
  if(isDemo||!supabaseClient)return;
  supabaseClient.channel('quiz-live')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'quiz_sessions'},function(){loadData()})
    .subscribe(function(status){
      if(status==='SUBSCRIBED'){console.log('Realtime: connected');setConnected(true)}
      if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){console.warn('Realtime:',status);setConnected(false)}
    });
}

function initPresentationMode(){
  var reset=function(){
    document.body.classList.remove('hide-cursor');
    clearTimeout(cursorTimer);
    cursorTimer=setTimeout(function(){document.body.classList.add('hide-cursor')},5000);
  };
  document.addEventListener('mousemove',reset);
  document.addEventListener('mousedown',reset);
  reset();

  if('wakeLock' in navigator){
    var wl=null;
    var req=async function(){
      try{wl=await navigator.wakeLock.request('screen');console.log('Wake Lock active')}
      catch(e){console.warn('Wake Lock failed:',e)}
    };
    req();
    document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')req()});
  }
}

function init(){
  var ok=CONFIG.SUPABASE_URL.indexOf('supabase.co')!==-1&&CONFIG.SUPABASE_ANON_KEY.length>20;
  if(ok&&window.supabase){
    supabaseClient=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
    isDemo=false;loadData();subscribeRealtime();
    setInterval(loadData,CONFIG.POLL_INTERVAL);setConnected(true);
  }else{
    isDemo=true;console.log('Demo mode: Supabase not configured.');setConnected(false);
    updateCounters(DEMO_STATS);updateBars(DEMO_STATS);updateDonut(DEMO_STATS);updateFeed(DEMO_FEED);
  }
  initPresentationMode();
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>
</body>
</html>
